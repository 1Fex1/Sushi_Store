<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Menu — Shiongmao Wok</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/style.css" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Tajawal', sans-serif; }
  .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
  .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  #cart-drawer { right: auto !important; left: 0 !important; }
  #cart-drawer.translate-x-full, #cart-drawer.-translate-x-full { transform: translateX(-100%) !important; }
  #cart-drawer.translate-x-0 { transform: translateX(0) !important; }
</style>
</head>
<body class="bg-ink text-cream">

  <header class="fixed top-0 inset-x-0 z-50 bg-ink/90 backdrop-blur border-b border-white/10">
    <div class="max-w-7xl mx-auto px-5 md:px-8 h-20 flex items-center justify-between gap-4 relative">
      
      <a href="index.html" class="flex items-center gap-2 flex-shrink-0 group" dir="ltr">
        <div class="w-11 h-11 md:w-12 md:h-12 rounded-full overflow-hidden border border-crimson/30 shrink-0 shadow-lg">
          <img src="images/panda-logo.png" alt="Shiongmao Logo" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" />
        </div>
        <div class="flex flex-col justify-center items-center mt-1">
          <span class="text-xl md:text-2xl font-bold text-crimson leading-none tracking-wide">Shiongmao</span>
          <div class="flex items-center gap-2 mt-1">
            <span class="w-3 md:w-4 h-[1px] bg-crimson"></span>
            <span class="text-[0.65rem] md:text-[0.7rem] text-cream font-medium tracking-widest uppercase">Wok</span>
            <span class="w-3 md:w-4 h-[1px] bg-crimson"></span>
          </div>
        </div>
      </a>

      <nav class="hidden lg:flex items-center gap-8 text-base font-semibold absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2" dir="ltr">
        <a href="index.html" class="nav-link hover:text-gold transition text-white/70">Home</a>
        <a href="menu.html" class="nav-link text-gold border-b-2 border-gold pb-1">Menu</a>
        <a href="#footer" class="nav-link hover:text-gold transition text-white/70">Contact Us</a>
      </nav>

      <div class="flex items-center gap-3 z-10">
        <button onclick="openCart()" class="relative w-10 h-10 flex items-center justify-center border border-white/20 rounded-full hover:border-gold transition cursor-pointer">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span id="cart-count" class="absolute -top-1.5 -right-1.5 bg-crimson text-white text-[11px] w-5 h-5 rounded-full flex items-center justify-center transition-transform font-bold">0</span>
        </button>
      </div>
    </div>
  </header>

  <section class="pt-36 pb-12 px-5 md:px-8 text-center bg-gradient-to-b from-black/30 to-transparent relative overflow-hidden">
    
    <div class="relative z-10">
      <h1 class="text-4xl md:text-5xl text-gold mb-3 font-bold drop-shadow-lg">قائمة الطعام</h1>
      <p class="text-white/70 text-sm md:text-base mb-6 drop-shadow-md">اكتشف أطباقنا الآسيوية المميزة</p>
    </div>
  </section>

  <div class="sticky top-20 z-40 bg-ink/95 backdrop-blur-md py-4 border-b border-white/10 shadow-lg flex flex-wrap justify-center gap-2 px-4">
    <button class="tab-btn tab-active px-5 py-1.5 rounded-full text-sm font-bold border border-white/10 transition-all bg-crimson text-white" data-tab="all">الكل</button>
    <button class="tab-btn px-5 py-1.5 rounded-full text-sm font-bold border border-white/10 transition-all hover:border-white/30" data-tab="appetizers">مقبلات</button>
    <button class="tab-btn px-5 py-1.5 rounded-full text-sm font-bold border border-white/10 transition-all hover:border-white/30" data-tab="wok">أطباق الووك</button>
    <button class="tab-btn px-5 py-1.5 rounded-full text-sm font-bold border border-white/10 transition-all hover:border-white/30" data-tab="sushi">سوشي</button>
    <button class="tab-btn px-5 py-1.5 rounded-full text-sm font-bold border border-white/10 transition-all hover:border-white/30" data-tab="drinks">مشروبات</button>
  </div>

  <section class="px-4 md:px-8 py-12 min-h-[50vh] relative overflow-hidden bg-ink">
    <div class="max-w-7xl mx-auto relative z-10">
      <div id="menu-sections"></div>
    </div>
  </section>

  <footer id="footer" class="py-12 px-6 md:px-12 bg-black border-t border-white/5 relative overflow-hidden">
    <div class="absolute right-0 top-0 h-full w-full md:w-1/2 pointer-events-none z-0">
      <div class="absolute inset-0 bg-gradient-to-r from-black via-black/40 to-transparent z-10"></div>
      <img src="images/japan.jpg" alt="خلفية جبل اليابان" class="w-full h-full object-cover opacity-40 grayscale" />
    </div>
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-start gap-6 relative z-10" dir="ltr">
      <div class="w-24 h-24 shrink-0 hover:rotate-6 transition-transform duration-500">
        <img src="images/panda-logo.png" alt="شعار شيونغماو" class="w-full h-full object-contain" />
      </div>
      <div class="flex flex-col justify-center items-center md:items-start pt-1">
        <img src="images/name-removebg-preview.png" alt="Shiongmao Wok" class="h-10 md:h-12 w-auto object-contain mb-3" />
        <div dir="rtl" class="text-center md:text-right space-y-3">
          <p class="text-gold/90 text-sm font-bold">مكونات طازجة، ونكهة لا تُنسى</p>
          
          <div class="flex items-center justify-center md:justify-start gap-5 text-white/60 py-2">
            <a href="tel:+201000000000" class="flex items-center gap-2 hover:text-gold transition" dir="ltr">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
              <span class="text-sm font-sans tracking-wider">+20 100 000 0000</span>
            </a>
            <a href="#" class="hover:text-emerald-500 transition" title="WhatsApp">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
            </a>
            <a href="#" class="hover:text-pink-500 transition" title="Instagram">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
            </a>
            <a href="#" class="hover:text-white transition" title="X (Twitter)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l11.733 16h4.267l-11.733 -16z"></path><path d="M4 20l6.768 -6.768m2.46 -2.46l6.772 -6.772"></path></svg>
            </a>
          </div>

          <p class="text-white/30 text-[11px] pt-1">© 2026 Shiongmao Wok. All rights reserved.</p>
        </div>
      </div>
    </div>
  </footer>

  <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-6 py-3 rounded-full shadow-2xl z-[100] transition-all duration-300 opacity-0 translate-y-10 pointer-events-none flex items-center gap-3 font-bold text-sm">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
    <span id="toast-message">تمت الإضافة للسلة</span>
  </div>

  <div id="cart-overlay" class="hidden fixed inset-0 bg-black/60 z-[60]" onclick="closeCart()"></div>
  <aside id="cart-drawer" class="fixed top-0 left-0 h-full w-full sm:w-96 bg-ink-2 z-[70] -translate-x-full flex flex-col border-l border-white/10 transition-transform duration-300">
    <div class="flex items-center justify-between p-5 border-b border-white/10">
      <h3 class="text-2xl font-bold">سلة الطلبات</h3>
      <button onclick="closeCart()" class="w-9 h-9 flex items-center justify-center rounded-full border border-white/15 hover:border-gold hover:text-gold transition text-xl">✕</button>
    </div>
    <div class="flex-1 overflow-y-auto px-5 py-4" id="cart-items">
      <div class="text-center text-white/40 mt-10 text-sm">السلة فارغة حالياً</div>
    </div>
    <div class="p-5 border-t border-white/10 space-y-4">
      <div class="flex justify-between text-base font-bold text-white/80">
        <span>الإجمالي</span>
        <span id="cart-total" class="text-gold" dir="ltr">$0.00</span>
      </div>
      <button id="cart-confirm-btn" onclick="goToCheckout()" class="btn-primary w-full text-center opacity-40 pointer-events-none text-base font-bold py-3 bg-crimson rounded-lg transition-all">إتمام الطلب</button>
      <button onclick="clearCart()" class="w-full text-center text-sm text-white/40 hover:text-crimson transition">إفراغ السلة</button>
    </div>
  </aside>

  <!-- External Script Link -->
  <script src="js/menu.js"></script>
</body>
</html>
