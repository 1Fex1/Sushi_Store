<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — Shiongmao Wok</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Tajawal', sans-serif; }
    input[type="radio"] { accent-color: #b8283a; }
  </style>
</head>
<body class="bg-ink text-cream relative min-h-screen">

  <img src="images/bamboo.png" alt="بامبو" class="absolute bottom-0 -left-10 w-[300px] opacity-[0.1] invert mix-blend-screen pointer-events-none z-0" />

  <header class="w-full bg-ink/90 border-b border-white/10 relative z-10">
    <div class="max-w-7xl mx-auto px-5 h-20 flex items-center justify-between">
      <a href="menu.html" class="flex items-center gap-2 hover:opacity-80 transition" dir="ltr">
        <div class="w-10 h-10 rounded-full overflow-hidden border border-crimson/30">
          <img src="images/panda-logo.png" alt="Logo" class="w-full h-full object-cover" />
        </div>
        <span class="text-xl font-bold text-crimson">Shiongmao</span>
      </a>
      <a href="menu.html" class="text-sm font-bold text-white/50 hover:text-gold transition">← الرجوع للسلة</a>
    </div>
  </header>

  <div class="max-w-6xl mx-auto px-5 py-12 grid grid-cols-1 lg:grid-cols-12 gap-10 relative z-10">
    
    <div class="lg:col-span-5 bg-ink-2 border border-white/10 rounded-2xl p-6 h-fit shadow-lg">
      <h2 class="text-2xl font-bold text-gold mb-6 border-b border-white/10 pb-4">ملخص الطلب</h2>
      <div id="summary-items" class="space-y-4 max-h-[40vh] overflow-y-auto pr-2"></div>
      <div class="mt-6 pt-4 border-t border-white/10 flex justify-between items-center text-xl font-bold">
        <span>الإجمالي:</span>
        <span id="summary-total" class="text-crimson" dir="ltr">$0.00</span>
      </div>
    </div>

    <div class="lg:col-span-7 bg-black/40 border border-white/5 rounded-2xl p-6 md:p-8 shadow-lg">
      <h2 class="text-2xl font-bold text-white mb-6">بيانات الطلب</h2>

      <div class="flex gap-4 mb-8">
        <label class="flex-1 cursor-pointer">
          <input type="radio" name="order_type" value="cash" class="peer sr-only" checked onchange="toggleFormFields()">
          <div class="p-4 text-center rounded-xl border-2 border-white/20 peer-checked:border-[#b8283a] peer-checked:bg-[#b8283a]/15 transition-all h-full flex flex-col justify-center">
            <span class="block font-bold text-white mb-1">كاش بالفرع</span>
            <span class="text-xs text-white/50">الدفع نقداً داخل المطعم</span>
          </div>
        </label>
        
        <label class="flex-1 cursor-pointer">
          <input type="radio" name="order_type" value="online" class="peer sr-only" onchange="toggleFormFields()">
          <div class="p-4 text-center rounded-xl border-2 border-white/20 peer-checked:border-[#b8283a] peer-checked:bg-[#b8283a]/15 transition-all h-full flex flex-col justify-center">
            <span class="block font-bold text-white mb-1">توصيل ودفع أونلاين</span>
            <span class="text-xs text-white/50">فودافون كاش أو انستا باي</span>
          </div>
        </label>
      </div>

      <div id="error-msg" class="hidden bg-red-500/20 border border-red-500 text-red-400 p-3 rounded-lg text-sm font-bold mb-5 text-center"></div>

      <form id="checkout-form" onsubmit="submitOrder(event)" class="space-y-5">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div>
            <label class="block text-sm text-white/70 mb-2">الاسم بالكامل</label>
            <input type="text" id="cust-name" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-white focus:outline-none focus:border-gold transition" placeholder="أدخل اسمك">
          </div>
          <div>
            <label class="block text-sm text-white/70 mb-2">رقم الهاتف</label>
            <input type="tel" id="cust-phone" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-white focus:outline-none focus:border-gold transition" placeholder="مثال: 01000000000" dir="ltr" style="text-align: right;">
          </div>
        </div>

        <div id="cash-fields" class="block">
          <label class="block text-sm text-white/70 mb-2">رقم الطاولة (اختياري)</label>
          <input type="number" id="cust-table" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-white focus:outline-none focus:border-gold transition" placeholder="أدخل رقم طاولتك إذا كنت بالداخل">
        </div>

        <div id="online-fields" class="hidden space-y-5">
          <div>
            <label class="block text-sm text-white/70 mb-2">عنوان التوصيل بالتفصيل</label>
            <textarea id="cust-address" rows="2" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-white focus:outline-none focus:border-gold transition" placeholder="رقم العمارة، الشارع، المنطقة..."></textarea>
          </div>
          
          <div class="bg-ink-2 p-4 rounded-xl border border-white/10">
            <label class="block text-sm text-white/70 mb-3 font-bold">اختر طريقة الدفع:</label>
            <div class="flex gap-4">
              <label class="flex items-center gap-2 cursor-pointer text-sm">
                <input type="radio" name="payment_method" value="vodafone" checked>
                <span class="text-white">فودافون كاش</span>
              </label>
              <label class="flex items-center gap-2 cursor-pointer text-sm">
                <input type="radio" name="payment_method" value="instapay">
                <span class="text-white">InstaPay</span>
              </label>
            </div>
          </div>
        </div>

        <button type="submit" class="w-full mt-6 bg-crimson text-white font-bold text-lg py-4 rounded-xl hover:bg-crimson/80 transition-all shadow-lg hover:-translate-y-1">
          تأكيد وإرسال الطلب
        </button>
      </form>
    </div>
  </div>

  <div id="success-modal" class="hidden fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-5 backdrop-blur-sm opacity-0 transition-opacity duration-300">
    <div id="success-modal-content" class="bg-ink border border-white/10 rounded-2xl p-8 max-w-sm w-full text-center shadow-2xl transform scale-95 transition-transform duration-300">
      
      <div class="w-20 h-20 bg-emerald-500/20 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-5 border border-emerald-500/30">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      
      <h3 class="text-2xl font-bold text-white mb-2">تم تأكيد الطلب!</h3>
      <p class="text-white/70 text-sm leading-relaxed mb-6">شكراً لاختيارك Shiongmao Wok! لقد استلمنا طلبك بنجاح وسنقوم بالتواصل معك قريباً لتأكيده.</p>
      
      <div class="bg-white/5 border border-white/10 rounded-lg p-3 mb-6">
        <span class="text-xs text-white/50 block mb-1">رقم الطلب الخاص بك</span>
        <span class="text-gold font-bold tracking-widest text-lg" id="order-ref-number" dir="ltr">#SW-123456</span>
      </div>
      
      <button onclick="closeSuccessAndRedirect()" class="w-full bg-crimson text-white font-bold py-3 rounded-xl hover:bg-[#b8283a]/80 transition-all shadow-lg">
        العودة للرئيسية
      </button>
    </div>
  </div>

  <!-- External Script Link -->
  <script src="js/checkout.js"></script>
</body>
</html>
